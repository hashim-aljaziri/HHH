services:
  - type: web
    name: qurra-boutique
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 3
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SECRET_KEY
        generateValue: true
